name: Semgrep SAST scan

on:
  schedule:
    - cron: "0 4 * * *"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install semgrep
        run: pip install semgrep

      - name: Run semgrep (scheduled full scan)
        if: github.event_name != 'pull_request'
        run: >
          semgrep scan
          --config .semgrep.yml
          --config p/security-audit
          --config p/owasp-top-ten
          --config p/c
          --config p/java
          --config p/python
          --sarif --output semgrep-results.sarif

      - name: Run semgrep (PR diff-aware scan)
        id: semgrep-pr
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: >
          semgrep scan
          --config .semgrep.yml
          --config p/security-audit
          --config p/owasp-top-ten
          --config p/c
          --config p/java
          --config p/python
          --baseline-commit "$BASE_SHA"
          --error --severity ERROR
          --sarif --output semgrep-results.sarif

      - name: Upload SARIF results
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

      - name: Fail if semgrep found errors
        if: steps.semgrep-pr.outcome == 'failure'
        run: exit 1
